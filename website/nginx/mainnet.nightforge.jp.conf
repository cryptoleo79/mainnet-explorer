server {
    server_name mainnet.nightforge.jp;
    root /var/www/explorer-mainnet;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_types application/wasm text/plain text/css application/json application/javascript text/xml application/xml;

    # Mainnet API
    location /api/mainnet/ {
        proxy_pass http://127.0.0.1:3005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # Direct API access (for tools pages)
    location /api/dust-calculator { proxy_pass http://127.0.0.1:3005/api/dust-calculator; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/dust-status { proxy_pass http://127.0.0.1:3005/api/dust-status; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/dust-economics { proxy_pass http://127.0.0.1:3005/api/dust-economics; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/privacy-score { proxy_pass http://127.0.0.1:3005/api/privacy-score; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/widget/ { proxy_pass http://127.0.0.1:3005/api/widget/; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/address/ { proxy_pass http://127.0.0.1:3005/api/address/; proxy_http_version 1.1; proxy_set_header Host $host; }

    # WebSocket proxy
    location /ws {
        proxy_pass http://127.0.0.1:3005/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # CoinGecko price proxy
    location /api/price {
        proxy_pass http://127.0.0.1:3005/api/price;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static assets
    location /api/committee {
        proxy_pass http://127.0.0.1:3005/api/committee;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/analytics/ {
        proxy_pass http://127.0.0.1:3005/api/analytics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/stats {
        proxy_pass http://127.0.0.1:3005/api/stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/health {
        proxy_pass http://127.0.0.1:3005/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/blocks {
        proxy_pass http://127.0.0.1:3005/api/blocks;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/epoch {
        proxy_pass http://127.0.0.1:3005/api/epoch;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/network {
        proxy_pass http://127.0.0.1:3005/api/network;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/midnight-txs {
        proxy_pass http://127.0.0.1:3005/api/midnight-txs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/governance {
        proxy_pass http://127.0.0.1:3005/api/governance;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/epochs {
        proxy_pass http://127.0.0.1:3005/api/epochs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/cardano-anchors {
        proxy_pass http://127.0.0.1:3005/api/cardano-anchors;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/contracts/ {
        proxy_pass http://127.0.0.1:3005/api/contracts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/block-producers {
        proxy_pass http://127.0.0.1:3005/api/block-producers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # Tools pages
    location /tools/ {
        proxy_pass http://127.0.0.1:3005/tools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # API docs
    location = /api/docs {
        proxy_pass http://127.0.0.1:3005/api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mainnet.nightforge.jp/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mainnet.nightforge.jp/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = mainnet.nightforge.jp) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name mainnet.nightforge.jp;

    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot


}