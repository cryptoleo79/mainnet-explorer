server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nightforge.jp;
    root /var/www/explorer-main;
    index index.html;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    gzip on;
    gzip_types application/wasm text/plain text-css application/json application/javascript text/xml application/xml;
    # Clean URL for YAMORI page
    location = /yamori {
        rewrite ^ /yamori.html last;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
    location /api/committee {
        proxy_pass http://127.0.0.1:3005/api/committee;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/analytics/ {
        proxy_pass http://127.0.0.1:3005/api/analytics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/stats {
        proxy_pass http://127.0.0.1:3005/api/stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/health {
        proxy_pass http://127.0.0.1:3005/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/blocks {
        proxy_pass http://127.0.0.1:3005/api/blocks;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/epoch {
        proxy_pass http://127.0.0.1:3005/api/epoch;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/network {
        proxy_pass http://127.0.0.1:3005/api/network;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/midnight-txs {
        proxy_pass http://127.0.0.1:3005/api/midnight-txs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/governance {
        proxy_pass http://127.0.0.1:3005/api/governance;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/epochs {
        proxy_pass http://127.0.0.1:3005/api/epochs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/cardano-anchors {
        proxy_pass http://127.0.0.1:3005/api/cardano-anchors;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/contracts/ {
        proxy_pass http://127.0.0.1:3005/api/contracts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/block-producers {
        proxy_pass http://127.0.0.1:3005/api/block-producers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # Tools pages
    location /tools/ {
        proxy_pass http://127.0.0.1:3005/tools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # API docs
    location = /api/docs {
        proxy_pass http://127.0.0.1:3005/api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /api/mainnet/ {
        proxy_pass http://127.0.0.1:3005/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # Direct API access (for tools pages)
    location /api/dust-calculator {
        proxy_pass http://127.0.0.1:3005/api/dust-calculator;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/dust-status {
        proxy_pass http://127.0.0.1:3005/api/dust-status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/dust-economics {
        proxy_pass http://127.0.0.1:3005/api/dust-economics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/privacy-score {
        proxy_pass http://127.0.0.1:3005/api/privacy-score;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/widget/ {
        proxy_pass http://127.0.0.1:3005/api/widget/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/address/ {
        proxy_pass http://127.0.0.1:3005/api/address/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # CoinGecko price proxy
    location /api/price {
        proxy_pass https://api.coingecko.com/api/v3/simple/price;
        proxy_ssl_server_name on;
        proxy_set_header Host api.coingecko.com;
        proxy_set_header Origin "";
        add_header Access-Control-Allow-Origin "*";
        
        # Timeouts - fail fast
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 5s;
        
        # Cache for 5 minutes
        proxy_cache coingecko_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_valid any 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }
    ssl_certificate /etc/letsencrypt/live/nightforge.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nightforge.jp/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    listen 80;
    listen [::]:80;
    server_name nightforge.jp;
    return 301 https://$host$request_uri;
}
